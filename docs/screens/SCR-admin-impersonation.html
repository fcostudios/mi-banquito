<script>
// Initialize Lucide icons
document.addEventListener('DOMContentLoaded', function() {
  if (window.lucide) lucide.createIcons();
  // IMP-208 Sprint 2.T — conditional rendering evaluator.
  // Watches form-field changes and toggles [hidden] on sections that
  // declare a `data-conditional-on="<field_id> == 'value'"` attribute.
  // Supports simple equality + && conjunction. Default: section is hidden
  // when the predicate is false, visible when true.
  // Resolve a field's CURRENT value (checked radio in a group, else element value).
  function fieldValue(fieldId) {
    var radios = document.querySelectorAll('[name="'+fieldId+'"]');
    if (radios.length) {
      for (var i=0;i<radios.length;i++){ if (radios[i].checked) return radios[i].value; }
      // no radio checked yet → unresolved
      return null;
    }
    var el = document.getElementById(fieldId) || document.querySelector('[data-field="'+fieldId+'"]');
    return el ? el.value : null;
  }
  function firstField(expr) {
    var m = (expr||'').match(/^([\w.]+)/);
    return m ? m[1] : '';
  }
  function condMatches(expr) {
    if (!expr) return true;
    var parts = expr.split('&&').map(function(s){return s.trim();});
    return parts.every(function(part){
      var m = part.match(/^([\w.]+)\s*(==|!=)\s*['"]?([\w.\-_]+)['"]?$/);
      if (!m) return true;
      var v = fieldValue(m[1]);
      if (v === null) return false;           // unresolved → not a match (fail-closed)
      return m[2] === '==' ? v === m[3] : v !== m[3];
    });
  }
  // Group-aware reveal: for each field, show exactly ONE conditional branch —
  // the matching one, or (if the field is unresolved at load) the first in the group.
  function applyConditionals() {
    var groups = {};
    document.querySelectorAll('[data-conditional-on]').forEach(function(sec){
      var f = firstField(sec.getAttribute('data-conditional-on'));
      (groups[f] = groups[f] || []).push(sec);
    });
    Object.keys(groups).forEach(function(f){
      var secs = groups[f];
      var resolved = fieldValue(f) !== null;
      var shownOne = false;
      secs.forEach(function(sec){
        var ok = condMatches(sec.getAttribute('data-conditional-on'));
        if (ok) { sec.removeAttribute('hidden'); shownOne = true; }
        else sec.setAttribute('hidden','');
      });
      // Field unresolved (nothing checked) → reveal the first branch so the screen
      // is never blank; user selection then switches via the change handler.
      if (!resolved && !shownOne && secs.length) secs[0].removeAttribute('hidden');
    });
  }
  // IMP-217 — conditional REQUIREDNESS. A field carrying
  // data-required-when="<field> == '<value>'" is always visible but becomes
  // `required` only when the predicate holds. Reuses fieldValue()/condMatches()
  // (the same evaluator as visibility conditionals) so the two compose. Toggles
  // the control's `required` attribute + an id-linked asterisk span
  // (data-req-star-for="<id>") so the label gains/loses its "*".
  function applyRequiredConditionals() {
    document.querySelectorAll('[data-required-when]').forEach(function(ctl){
      var expr = ctl.getAttribute('data-required-when') || '';
      var match = condMatches(expr);   // fail-closed false on unresolved controller
      ctl.toggleAttribute('required', match);
      var star = document.querySelector('[data-req-star-for="' + (ctl.id || '') + '"]');
      if (star) star.classList.toggle('hidden', !match);
    });
  }
  document.addEventListener('change', applyConditionals);
  document.addEventListener('input', applyConditionals);
  document.addEventListener('change', applyRequiredConditionals);
  document.addEventListener('input', applyRequiredConditionals);
  setTimeout(applyConditionals, 50);
  setTimeout(applyRequiredConditionals, 50);
});

// Command palette toggle
function toggleCommandPalette() {
  var el = document.getElementById('command-palette');
  if (el) el.classList.toggle('hidden');
}
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    toggleCommandPalette();
  }
  if (e.key === 'Escape') {
    var el = document.getElementById('command-palette');
    if (el) el.classList.add('hidden');
  }
});

// Tab switching
function switchTab(tabId, idx) {
  var buttons = document.querySelectorAll('[id^="btn-' + tabId + '_"]');
  var panels = document.querySelectorAll('[id^="panel-' + tabId + '_"]');
  buttons.forEach(function(b, i) {
    if (i === idx) {
      b.classList.add('border-b-2', 'border-primary-500', 'text-primary-600', 'font-semibold');
      b.classList.remove('text-slate-500');
    } else {
      b.classList.remove('border-b-2', 'border-primary-500', 'text-primary-600', 'font-semibold');
      b.classList.add('text-slate-500');
    }
  });
  panels.forEach(function(p, i) {
    p.classList.toggle('hidden', i !== idx);
    p.classList.toggle('block', i === idx);
  });
  if (window.lucide) lucide.createIcons();
}

// Wizard navigation
function updateWizardIndicator(wizardId, activeIdx) {
  var circles = document.querySelectorAll('[id^="' + wizardId + '_circle_"]');
  var base = 'w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold';
  var labelBase = 'text-[11px] hidden sm:block text-center max-w-[72px] leading-tight';
  circles.forEach(function(c, i) {
    c.className = base + (i === activeIdx
      ? ' bg-primary-500 text-white shadow-sm ring-2 ring-primary-200'
      : ' bg-white text-slate-500 border-2 border-slate-300');
    var parent = c.parentElement;
    if (parent) {
      var lbl = parent.querySelector('span');
      if (lbl) {
        lbl.className = labelBase + (i === activeIdx ? ' text-primary-600 font-semibold' : ' text-slate-400');
      }
    }
  });
}
function wizardNext(wizardId) {
  var steps = document.querySelectorAll('[id^="' + wizardId + '_step_"]');
  for (var i = 0; i < steps.length - 1; i++) {
    if (!steps[i].classList.contains('hidden')) {
      steps[i].classList.add('hidden');
      steps[i].classList.remove('block');
      steps[i+1].classList.remove('hidden');
      steps[i+1].classList.add('block');
      updateWizardIndicator(wizardId, i + 1);
      var pbN = document.getElementById('wizard_prev_btn'); if (pbN) pbN.hidden = false;
      break;
    }
  }
}
function wizardPrev(wizardId) {
  var steps = document.querySelectorAll('[id^="' + wizardId + '_step_"]');
  for (var i = 1; i < steps.length; i++) {
    if (!steps[i].classList.contains('hidden')) {
      steps[i].classList.add('hidden');
      steps[i].classList.remove('block');
      steps[i-1].classList.remove('hidden');
      steps[i-1].classList.add('block');
      updateWizardIndicator(wizardId, i - 1);
      var pbP = document.getElementById('wizard_prev_btn'); if (pbP) pbP.hidden = (i - 1 === 0);
      break;
    }
  }
}
</script>
