name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mi_banquito
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mi_banquito"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:55432/mi_banquito
      DB_DRIVER: pg
      APP_BASE_URL: http://localhost:3000
      AUTH0_DOMAIN: https://example.auth0.com
      AUTH0_CLIENT_ID: ci-client-id
      AUTH0_CLIENT_SECRET: ci-client-secret
      AUTH0_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      IMPERSONATION_COOKIE_SECRET: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
      AUTH0_ORGANIZATION: org_ci
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_SENTRY_DSN: https://public@example.ingest.sentry.io/1
      SENTRY_DSN: https://public@example.ingest.sentry.io/1
      BLOB_READ_WRITE_TOKEN: ci-vercel-blob-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Set Neon branch expiration
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: echo "NEON_EXPIRES_AT=$(date -u --date '+24 hours' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Create Neon verification branch
        id: create_neon_branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci/pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          database: neondb
          role: neondb_owner
          expires_at: ${{ env.NEON_EXPIRES_AT }}
          api_key: ${{ secrets.NEON_API_KEY }}
      - name: Verify schema on Neon PR branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url }}
          DB_DRIVER: pg
          ALLOW_NON_LOCAL_SCHEMA_APPLY: "1"
        run: |
          node scripts/apply-local-schema.mjs
          node scripts/verify-schema.mjs
          pnpm exec vitest run --maxWorkers=1 src/tenant.test.ts src/sprint3-substrate.test.ts src/interest-gains-schema.test.ts src/fail-closed-rls.test.ts
          node scripts/apply-local-schema.mjs
          node scripts/verify-schema.mjs
      - name: Apply full local schema
        run: cd packages/db && node scripts/apply-local-schema.mjs && node scripts/verify-schema.mjs
      - name: Type check
        run: pnpm type-check
      - name: Lint
        run: pnpm lint
      - name: Sprint 0-1 lifecycle and acceptance evidence
        run: pnpm audit:sprints0-1
      - name: Unit tests
        run: pnpm test
      - name: Blob consumer and SDK contracts
        env:
          BLOB_LIVE_REQUIRED: ${{ vars.BLOB_LIVE_REQUIRED || '0' }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN || 'ci-vercel-blob-placeholder' }}
        run: pnpm --filter mi-banquito-web test:contract
      - name: Build
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm --filter mi-banquito-web exec playwright install --with-deps chromium
      - name: Playwright smoke and axe accessibility tests
        run: |
          pnpm --filter mi-banquito-web test:e2e --project=chromium-desktop
          pnpm --filter mi-banquito-web test:e2e:movements --project=chromium-desktop
