# Design System enforcement (generated by Nous IMP-241 — DO NOT hand-edit)
name: design-system
on: [push, pull_request]
jobs:
  design-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: status-pill SSOT lint
        run: node scripts/check-status-pill.mjs .
      - name: no-hardcoded color
        run: node scripts/check-hardcoded-color.mjs .
      - name: no-hardcoded user-facing string
        run: node scripts/check-hardcoded-string.mjs .
      - name: Lucide allow-list
        run: node scripts/check-lucide-allowlist.mjs .
      - name: a11y / axe wiring
        run: node scripts/check-a11y.mjs .
